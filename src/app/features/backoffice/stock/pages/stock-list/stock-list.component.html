<div class="flex flex-col min-h-[calc(100vh-200px)]">
  <list-header
    title="Gestion du Stock"
    actionLabel="Nouvelle entrée"
    actionIcon="add_circle"
    (action)="onNewEntry()">
  </list-header>

  <mat-card class="w-full rounded-lg border border-gray-200 bg-white mb-6 pt-4 px-4">
    @if (magasins().length > 1) {
      <mat-form-field appearance="outline" class="magasin-select">
        <mat-label>Boutique</mat-label>
        <mat-select [value]="selectedMagasinId()" (selectionChange)="onMagasinChange($event.value)">
          @for (m of magasins(); track m._id) {
            <mat-option [value]="m._id">{{ m.nomMagasin }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    }
  </mat-card>

  <mat-card class="w-full rounded-lg shadow-md border border-gray-200 bg-white">
    <mat-card-content>
      <dynamic-table [config]="tableConfig()" [data]="stockProduits()"></dynamic-table>
    </mat-card-content>
  </mat-card>
</div>
