<div class="flex flex-col min-h-[calc(100vh-200px)]">
  <app-title 
    [textHead]="'Promotions'"
    [formTitle]="isEditMode() ? 'Modifier la promotion' : 'Nouvelle promotion'"
    (redirect)="onGoBack()"
  >
  </app-title>
    <mat-card class="w-full rounded-lg border border-gray-200 bg-white mb-6 pt-4 px-4">
      <div class="mb-4">
        <mat-form-field appearance="outline" class="w-full md:w-80">
          <mat-label>Boutique</mat-label>
          <mat-select
            [value]="selectedMagasinId()"
            [disabled]="magasins().length <= 1"
            (selectionChange)="onMagasinChange($event.value)">
            @for (m of magasins(); track m._id) {
              <mat-option [value]="m._id">{{ m.nomMagasin }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
    </mat-card>
  <mat-card class="w-full rounded-lg shadow-md border border-gray-200 bg-white">
    <mat-card-content>

      <dynamic-form
        [config]="formConfig()"
        [initialData]="userData()"
        [loading]="isLoading()"
        [showDelete]="isEditMode()"
        (formSubmit)="onSubmit($event)"
        (formCancel)="onCancel()"
        (formDelete)="onDelete()"
        (formValueChange)="onFormDataChange($event)"
      />
    </mat-card-content>
  </mat-card>
</div>
