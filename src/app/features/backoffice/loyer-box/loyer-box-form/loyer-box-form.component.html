<div class="flex flex-col min-h-[calc(100vh-200px)]">
  <app-title 
    [textHead]="'Loyer - ' + boxName()"
    [formTitle]="'Nouveau loyer pour ' + boxName()"
    (redirect)="onGoBack()">
  </app-title>
  
  <mat-card class="w-full rounded-lg shadow-md border border-gray-200 bg-white">
    <mat-card-content>
      <dynamic-form
        [config]="formConfig()"
        [loading]="isLoading()"
        [showDelete]="false"
        (formSubmit)="onSubmit($event)"
        (formCancel)="onCancel()" />
    </mat-card-content>
  </mat-card>
</div>
