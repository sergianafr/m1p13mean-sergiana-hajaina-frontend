<div class="flex flex-col min-h-[calc(100vh-200px)]">
  <app-title 
    [textHead]="'Type Magasin'"
    [formTitle]="isEditMode() ? 'Modifier le type de magasin' : 'Nouveau type de magasin'"
    (redirect)="onGoBack()">
  </app-title>
  
  <mat-card class="w-full rounded-lg shadow-md border border-gray-200 bg-white">
    <mat-card-content>
      <dynamic-form
        [config]="formConfig()"
        [initialData]="userData()"
        [loading]="isLoading()"
        [showDelete]="isEditMode()"
        (formSubmit)="onSubmit($event)"
        (formCancel)="onCancel()"
        (formDelete)="onDelete()" />
    </mat-card-content>
  </mat-card>
</div>
