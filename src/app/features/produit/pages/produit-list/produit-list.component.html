<div class="flex flex-col min-h-[calc(100vh-200px)] p-6">
  <list-header
    [title]="'Produits'"
    [actionLabel]="'Nouveau produit'"
    (action)="onCreate()"
    [showAction]="true">
  </list-header>

  <mat-card class="w-full rounded-lg shadow-md border border-gray-200 bg-white">
    <mat-card-content>
      <dynamic-table [config]="tableConfig()" [data]="produits()"></dynamic-table>
    </mat-card-content>
  </mat-card>
</div>
