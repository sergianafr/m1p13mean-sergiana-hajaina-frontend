<div class="magasin-card" (click)="goToDetail()">
  <div class="magasin-header">
    <div class="magasin-icon">
      <mat-icon class="store-icon">store</mat-icon>
    </div>
  </div>
  <div class="magasin-info">
    <span class="magasin-category">{{ magasin().typeMagasin?.nomTypeMagasin || 'Magasin' }}</span>
    <h3 class="magasin-name">{{ magasin().nomMagasin }}</h3>
    
    <div class="rating-section">
      <div class="stars">
        @for (star of ratingStars; track $index) {
          <mat-icon class="star" [class.filled]="star === 1">
            {{ star === 1 ? 'star' : 'star_border' }}
          </mat-icon>
        }
      </div>
      <span class="rating-text">
        {{ magasin().averageRating || 0 | number:'1.1-1' }} 
        ({{ magasin().totalReviews || 0 }} avis)
      </span>
    </div>
    
    <button class="view-btn" mat-raised-button color="primary">
      <mat-icon>visibility</mat-icon>
      Voir les produits
    </button>
  </div>
</div>
