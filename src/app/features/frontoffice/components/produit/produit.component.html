<div class="product-card" (click)="goToDetail()">
  <div class="product-image-wrapper">
    <img [src]="photo" [alt]="produit().nomProduit" class="product-image" />
    <div class="product-overlay">
      <button class="overlay-btn" (click)="onAddToFavoris(); $event.stopPropagation()" title="Ajouter aux favoris">
        <mat-icon>favorite_border</mat-icon>
      </button>
      <button class="overlay-btn" (click)="onAddToCart(); $event.stopPropagation()" title="Ajouter au panier">
        <mat-icon>add_shopping_cart</mat-icon>
      </button>
    </div>
  </div>
  <div class="product-info">
    <span class="product-category">{{ produit().typeProduit?.nomTypeProduit || 'Produit' }}</span>
    <h3 class="product-name">{{ produit().nomProduit }}</h3>
    <p class="product-shop">
      <mat-icon class="shop-icon">store</mat-icon>
      {{ produit().magasin?.nomMagasin || 'Boutique' }}
    </p>
  </div>
</div>
