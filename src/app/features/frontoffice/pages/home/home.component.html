<section class="hero">
	<h1>Accueil</h1>
	<p>Découvrez une sélection de produits (20 au hasard) provenant de toutes les boutiques.</p>
</section>

<div *ngIf="isLoading" class="state">
	<mat-progress-spinner mode="indeterminate" diameter="32"></mat-progress-spinner>
	<span>Chargement des produits...</span>
</div>

<div *ngIf="!isLoading && errorMessage" class="state error">
	<mat-icon>error</mat-icon>
	<span>{{ errorMessage }}</span>
</div>

<section *ngIf="!isLoading && !errorMessage" class="grid">
	<mat-card *ngFor="let p of produits" class="product-card">
		<div class="media">
			<img *ngIf="getMainPhotoUrl(p) as url" [src]="url" [alt]="p.nomProduit" />
			<div *ngIf="!getMainPhotoUrl(p)" class="no-image">
				<mat-icon aria-hidden="true">image</mat-icon>
			</div>
		</div>

		<mat-card-content class="content">
			<div class="title" [title]="p.nomProduit">{{ p.nomProduit }}</div>
			<div class="desc" *ngIf="p.descriptionProduit">{{ p.descriptionProduit }}</div>
			<div class="meta">
				<mat-icon class="meta-icon" aria-hidden="true">inventory_2</mat-icon>
				<span>{{ getUniteLabel(p) }}</span>
			</div>
		</mat-card-content>
	</mat-card>
</section>
